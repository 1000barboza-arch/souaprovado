<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login - Sou Aprovado</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
}

button{
background:#1e88e5;
color:white;
border:none;
padding:10px;
width:100%;
border-radius:6px;
font-size:16px;
}

a{
display:block;
margin-top:10px;
}

</style>

</head>

<body>

<div class="box">

<h2>Login</h2>

<input type="email" placeholder="Seu email">

<input type="password" placeholder="Senha">

<button>Entrar</button>

<a href="#">Criar conta</a>

</div>

</body>
</html>
